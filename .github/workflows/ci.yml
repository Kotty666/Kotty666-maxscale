---
name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Install PDK
        run: |
          wget https://apt.puppet.com/puppet-tools-release-jammy.deb
          sudo dpkg -i puppet-tools-release-jammy.deb
          sudo apt-get update
          sudo apt-get install -y pdk

      - name: PDK Validate
        run: pdk validate --parallel

  lint:
    name: Puppet Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Install dependencies
        run: |
          gem install puppet-lint
          gem install puppet-lint-absolute_classname-check
          gem install puppet-lint-leading_zero-check
          gem install puppet-lint-trailing_comma-check
          gem install puppet-lint-version_comparison-check
          gem install puppet-lint-unquoted_string-check
          gem install puppet-lint-empty_string-check

      - name: Run puppet-lint
        run: |
          puppet-lint --fail-on-warnings \
            --no-140chars-check \
            --no-documentation-check \
            --no-autoloader_layout-check \
            manifests/ types/

  syntax:
    name: Syntax Check
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        puppet_version:
          - '7'
          - '8'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Install Puppet ${{ matrix.puppet_version }}
        run: |
          gem install puppet -v "~> ${{ matrix.puppet_version }}.0"
          gem install puppet-syntax

      - name: Check Puppet syntax
        run: |
          puppet parser validate manifests/**/*.pp types/**/*.pp

      - name: Check ERB/EPP syntax
        run: |
          for file in templates/*.epp; do
            echo "Checking $file"
            puppet epp validate "$file"
          done

  unit-tests:
    name: Unit Tests - Puppet ${{ matrix.puppet_version }}
    needs: [validate, lint, syntax]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        puppet_version:
          - '7.0'
          - '7.24'
          - '8.0'
          - '8.4'
        include:
          - puppet_version: '7.0'
            ruby_version: '2.7'
          - puppet_version: '7.24'
            ruby_version: '3.2'
          - puppet_version: '8.0'
            ruby_version: '3.2'
          - puppet_version: '8.4'
            ruby_version: '3.2'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby ${{ matrix.ruby_version }}
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby_version }}

      - name: Install dependencies
        env:
          PUPPET_GEM_VERSION: "~> ${{ matrix.puppet_version }}"
        run: |
          gem install bundler
          bundle config set --local without 'acceptance documentation'
          bundle install --jobs 4 --retry 3

      - name: Setup fixtures
        run: bundle exec rake spec_prep

      - name: Run unit tests
        run: bundle exec rake spec

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-puppet-${{ matrix.puppet_version }}
          path: coverage/
          retention-days: 5

  unit-tests-os-matrix:
    name: Unit Tests - ${{ matrix.os_name }}
    needs: [validate, lint, syntax]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - os_name: 'Debian 11'
            os_facts: '{"os": {"family": "Debian", "name": "Debian", "release": {"major": "11", "full": "11"}, "distro": {"codename": "bullseye"}}, "operatingsystem": "Debian", "operatingsystemrelease": "11"}'
          - os_name: 'Debian 12'
            os_facts: '{"os": {"family": "Debian", "name": "Debian", "release": {"major": "12", "full": "12"}, "distro": {"codename": "bookworm"}}, "operatingsystem": "Debian", "operatingsystemrelease": "12"}'
          - os_name: 'Ubuntu 22.04'
            os_facts: '{"os": {"family": "Debian", "name": "Ubuntu", "release": {"major": "22.04", "full": "22.04"}, "distro": {"codename": "jammy"}}, "operatingsystem": "Ubuntu", "operatingsystemrelease": "22.04"}'
          - os_name: 'Ubuntu 24.04'
            os_facts: '{"os": {"family": "Debian", "name": "Ubuntu", "release": {"major": "24.04", "full": "24.04"}, "distro": {"codename": "noble"}}, "operatingsystem": "Ubuntu", "operatingsystemrelease": "24.04"}'
          - os_name: 'RHEL 8'
            os_facts: '{"os": {"family": "RedHat", "name": "RedHat", "release": {"major": "8", "full": "8.9"}}, "operatingsystem": "RedHat", "operatingsystemrelease": "8.9"}'
          - os_name: 'RHEL 9'
            os_facts: '{"os": {"family": "RedHat", "name": "RedHat", "release": {"major": "9", "full": "9.3"}}, "operatingsystem": "RedHat", "operatingsystemrelease": "9.3"}'
          - os_name: 'Rocky 8'
            os_facts: '{"os": {"family": "RedHat", "name": "Rocky", "release": {"major": "8", "full": "8.9"}}, "operatingsystem": "Rocky", "operatingsystemrelease": "8.9"}'
          - os_name: 'Rocky 9'
            os_facts: '{"os": {"family": "RedHat", "name": "Rocky", "release": {"major": "9", "full": "9.3"}}, "operatingsystem": "Rocky", "operatingsystemrelease": "9.3"}'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'

      - name: Install dependencies
        env:
          PUPPET_GEM_VERSION: "~> 8.0"
        run: |
          gem install bundler
          bundle config set --local without 'acceptance documentation'
          bundle install --jobs 4 --retry 3

      - name: Setup fixtures
        run: bundle exec rake spec_prep

      - name: Run unit tests for ${{ matrix.os_name }}
        env:
          SPEC_FACTS_OS: ${{ matrix.os_facts }}
        run: bundle exec rake spec

  documentation:
    name: Generate Documentation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Install puppet-strings
        run: |
          gem install puppet
          gem install puppet-strings

      - name: Generate REFERENCE.md
        run: |
          puppet strings generate --format markdown --out REFERENCE.md

      - name: Upload documentation
        uses: actions/upload-artifact@v4
        with:
          name: documentation
          path: REFERENCE.md
          retention-days: 30

  build:
    name: Build Module
    needs: [unit-tests]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Install PDK
        run: |
          wget https://apt.puppet.com/puppet-tools-release-jammy.deb
          sudo dpkg -i puppet-tools-release-jammy.deb
          sudo apt-get update
          sudo apt-get install -y pdk

      - name: Build module
        run: pdk build --force

      - name: Upload module package
        uses: actions/upload-artifact@v4
        with:
          name: puppet-module
          path: pkg/*.tar.gz
          retention-days: 30
