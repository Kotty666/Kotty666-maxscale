---
name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: PDK Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Install PDK
        run: |
          wget https://apt.puppet.com/puppet-tools-release-jammy.deb
          sudo dpkg -i puppet-tools-release-jammy.deb
          sudo apt-get update
          sudo apt-get install -y pdk

      - name: PDK Validate
        run: pdk validate metadata,puppet,yaml --parallel

  lint:
    name: Puppet Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Install puppet-lint
        run: gem install puppet-lint --no-document

      - name: Run puppet-lint
        run: |
          puppet-lint \
            --no-140chars-check \
            --no-documentation-check \
            --no-autoloader_layout-check \
            manifests/ types/

  syntax:
    name: Syntax Check - Puppet ${{ matrix.puppet_version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        puppet_version:
          - '7'
          - '8'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'

      - name: Install Puppet ${{ matrix.puppet_version }}
        run: gem install puppet -v "~> ${{ matrix.puppet_version }}.0" --no-document

      - name: Check Puppet manifest syntax
        run: |
          find manifests -name '*.pp' -exec puppet parser validate {} +
          find types -name '*.pp' -exec puppet parser validate {} +

      - name: Check EPP template syntax
        run: |
          for file in templates/*.epp; do
            echo "Checking $file"
            puppet epp validate "$file"
          done

  unit-tests:
    name: Unit Tests - Puppet ${{ matrix.puppet_version }}
    needs: [validate, lint, syntax]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        puppet_version:
          - '7.24'
          - '8.0'
          - '8.10'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'

      - name: Install dependencies
        env:
          PUPPET_GEM_VERSION: "~> ${{ matrix.puppet_version }}"
        run: |
          gem install bundler --no-document
          bundle config set --local without 'acceptance documentation rubocop'
          bundle install --jobs 4 --retry 3

      - name: Setup test fixtures
        run: bundle exec rake spec_prep

      - name: Run unit tests
        run: bundle exec rake spec

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-puppet-${{ matrix.puppet_version }}
          path: coverage/
          retention-days: 5

  os-matrix-tests:
    name: Unit Tests - ${{ matrix.os_name }}
    needs: [validate, lint, syntax]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - os_name: 'Debian 11'
            operatingsystem: 'Debian'
            operatingsystemrelease: '11'
            osfamily: 'Debian'
          - os_name: 'Debian 12'
            operatingsystem: 'Debian'
            operatingsystemrelease: '12'
            osfamily: 'Debian'
          - os_name: 'Ubuntu 22.04'
            operatingsystem: 'Ubuntu'
            operatingsystemrelease: '22.04'
            osfamily: 'Debian'
          - os_name: 'Ubuntu 24.04'
            operatingsystem: 'Ubuntu'
            operatingsystemrelease: '24.04'
            osfamily: 'Debian'
          - os_name: 'RHEL 8'
            operatingsystem: 'RedHat'
            operatingsystemrelease: '8'
            osfamily: 'RedHat'
          - os_name: 'RHEL 9'
            operatingsystem: 'RedHat'
            operatingsystemrelease: '9'
            osfamily: 'RedHat'
          - os_name: 'Rocky 8'
            operatingsystem: 'Rocky'
            operatingsystemrelease: '8'
            osfamily: 'RedHat'
          - os_name: 'Rocky 9'
            operatingsystem: 'Rocky'
            operatingsystemrelease: '9'
            osfamily: 'RedHat'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'

      - name: Install dependencies
        env:
          PUPPET_GEM_VERSION: "~> 8.0"
        run: |
          gem install bundler --no-document
          bundle config set --local without 'acceptance documentation rubocop'
          bundle install --jobs 4 --retry 3

      - name: Setup test fixtures
        run: bundle exec rake spec_prep

      - name: Run unit tests for ${{ matrix.os_name }}
        env:
          FACTER_operatingsystem: ${{ matrix.operatingsystem }}
          FACTER_operatingsystemrelease: ${{ matrix.operatingsystemrelease }}
          FACTER_osfamily: ${{ matrix.osfamily }}
        run: bundle exec rake spec

  documentation:
    name: Generate Documentation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Install puppet-strings
        run: |
          gem install puppet --no-document
          gem install puppet-strings --no-document

      - name: Generate REFERENCE.md
        run: puppet strings generate --format markdown --out REFERENCE.md

      - name: Upload documentation
        uses: actions/upload-artifact@v4
        with:
          name: documentation
          path: REFERENCE.md
          retention-days: 30

  build:
    name: Build Module
    needs: [unit-tests]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Install PDK
        run: |
          wget https://apt.puppet.com/puppet-tools-release-jammy.deb
          sudo dpkg -i puppet-tools-release-jammy.deb
          sudo apt-get update
          sudo apt-get install -y pdk

      - name: Build module
        run: pdk build --force

      - name: Upload module package
        uses: actions/upload-artifact@v4
        with:
          name: puppet-module
          path: pkg/*.tar.gz
          retention-days: 30
