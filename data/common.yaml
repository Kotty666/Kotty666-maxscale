---
# MaxScale Module Default Configuration
# These values can be overridden in your Hiera hierarchy

# Package settings
maxscale::package_name: 'maxscale'
maxscale::package_version: 'installed'

# Service settings
maxscale::service_ensure: 'running'
maxscale::service_enable: true
maxscale::service_name: 'maxscale'

# Repository settings
maxscale::manage_repo: false
maxscale::repo_version: '24.02'
maxscale::repo_base_url: ~
maxscale::gpg_key_id: 'BCA43417C3B485DD128EC6D4B7B3B788A8D3785C'

# Configuration file settings
maxscale::config_dir: '/etc'
maxscale::config_file: 'maxscale.cnf'
maxscale::config_owner: 'root'
maxscale::config_group: 'root'
maxscale::config_mode: '0644'

# Directory settings
maxscale::manage_dirs: true
maxscale::log_dir: '/var/log/maxscale'
maxscale::data_dir: '/var/lib/maxscale'
maxscale::cache_dir: '/var/cache/maxscale'
maxscale::pid_dir: '/var/run/maxscale'

# System user/group
maxscale::maxscale_user: 'maxscale'
maxscale::maxscale_group: 'maxscale'

# Default global options - minimal defaults, users add what they need
maxscale::global_options:
  threads: 'auto'
  log_info: false
  log_warning: true
  log_notice: false
  log_debug: false

# Component definitions - empty by default
maxscale::servers: {}
maxscale::monitors: {}
maxscale::services: {}
maxscale::listeners: {}
maxscale::filters: {}
maxscale::extra_config_files: {}
