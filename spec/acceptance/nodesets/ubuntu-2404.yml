---
HOSTS:
  ubuntu-2404:
    roles:
      - agent
      - default
    platform: ubuntu-24.04-amd64
    image: ubuntu:24.04
    hypervisor: docker
    docker_preserve_image: true
    docker_cmd:
      - '/sbin/init'
    docker_image_commands:
      - 'apt-get update && apt-get install -y wget curl gnupg systemd'
CONFIG:
  type: foss
  log_level: debug
